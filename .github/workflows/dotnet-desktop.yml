name: Build and Release .NET Application

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore TheGrammar.sln

      - name: Build Solution
        run: dotnet build TheGrammar.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test TheGrammar.sln --configuration Release --no-build --verbosity normal

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore TheGrammar.sln

      - name: Publish Application
        run: dotnet publish TheGrammar.sln --configuration Release --no-restore --output publish /p:Version=${{ github.event.release.tag_name }}

      - name: Create Squirrel Package
        shell: pwsh
        run: |
          Set-Alias Squirrel ($env:USERPROFILE + "\.nuget\packages\clowd.squirrel\2.11.1\tools\Squirrel.exe")
          Squirrel pack --packId "TheGrammar" --framework net10.0 --packVersion ${{ github.event.release.tag_name }} --packDirectory "publish"
          Compress-Archive -Path "Releases/*" -DestinationPath "Squirrel_${{ github.event.release.tag_name }}.zip"

      - name: Zip the Application
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "TheGrammar_${{ github.event.release.tag_name }}.zip"

      - name: Upload Assets to Release
        run: gh release upload ${{ github.event.release.tag_name }} "TheGrammar_${{ github.event.release.tag_name }}.zip" "Squirrel_${{ github.event.release.tag_name }}.zip" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}