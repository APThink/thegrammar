name: Build and Release .NET Application

on:
  push:
    branches: [ master ]
    tags:
      - '*'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore TheGrammar.sln

      - name: Build Solution
        run: dotnet build TheGrammar.sln --configuration Release --no-restore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore TheGrammar.sln

      - name: Publish Application
        run: dotnet publish TheGrammar.sln --configuration Release --no-restore --output publish /p:Version=${{ github.ref_name }}

      - name: Create Squirrel Package
        shell: pwsh
        run: |
          Set-Alias Squirrel ($env:USERPROFILE + "\.nuget\packages\clowd.squirrel\2.11.1\tools\Squirrel.exe")
          Squirrel pack --packId "TheGrammar" --framework net10.0 --packVersion ${{ github.ref_name }} --packDirectory "publish"
          Compress-Archive -Path "Releases/*" -DestinationPath "Squirrel_${{ github.ref_name }}.zip"

      - name: Zip the Application
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "TheGrammar_${{ github.ref_name }}.zip"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release - ${{ github.ref_name }}
          files: |
            TheGrammar_${{ github.ref_name }}.zip
            Squirrel_${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}